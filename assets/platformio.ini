; platformio.ini for ESP32 + ESP-IDF.
;
; POLICY:
;   - default_envs MUST be a *_dev environment. `pio run` (no args) flashes
;     a development build: unsigned, unencrypted, INFO logs, fast iteration.
;   - *_production environments are OPT-IN ONLY. The user must type
;     `pio run -e <board>_production -t upload` and acknowledge that
;     Flash Encryption release mode and anti-rollback are irreversible.
;
; Add new boards by copying a *_dev / *_production pair.
; ESP-IDF dependencies belong in main/idf_component.yml — NOT lib_deps.

[platformio]
default_envs = esp32s3_dev          ; default = development. Always.
src_dir = main                      ; PlatformIO's IDF wrapper expects sources in `src/`
                                    ; by default. Point it at IDF-canonical `main/` so
                                    ; the build doesn't fail with "Missing the `src` folder".

; ----------------------------------------------------------------------------
; Shared across all environments
; ----------------------------------------------------------------------------
[env]
platform = espressif32@^6.7.0
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; Compiler defaults applied to ALL components (incl. ESP-IDF source).
; PlatformIO has no per-component flag scoping, so anything here also
; compiles ESP-IDF source — keep it lenient enough that IDF builds clean
; on current GCC. Strict flags for application code (-Wextra, -Wpedantic,
; -Werror=conversion, etc.) belong in per-component CMakeLists.txt via:
;
;     target_compile_options(${COMPONENT_LIB} PRIVATE -Wextra -Wpedantic ...)
;
; -Wno-error=format suppresses the IDF v5.2 esp_tls.c bug where %p is
; passed a struct addrinfo* (newer GCC promotes this to error under
; -Werror=format=).
build_flags =
    -Wall
    -Werror=return-type
    -Werror=implicit-fallthrough
    -Wno-error=format
    -DCONFIG_FREERTOS_GENERATE_RUN_TIME_STATS=1
build_unflags = -std=gnu++11
build_flags += -std=gnu++17

board_build.partitions = partitions.csv

; ============================================================================
; ESP32 (dual-core, WiFi 4 + BT/BLE)
; ============================================================================
[env:esp32_dev]
board = esp32dev
build_type = debug
build_flags = ${env.build_flags} -Og -g3 -DDEVELOPMENT_BUILD=1
board_build.sdkconfig_defaults = sdkconfig.defaults

[env:esp32_production]
board = esp32dev
build_type = release
build_flags = ${env.build_flags} -O2 -DPRODUCTION_BUILD=1
board_build.sdkconfig_defaults = sdkconfig.defaults;sdkconfig.production.defaults
board_build.embed_txtfiles =
    certs/api_root_ca.pem

; ============================================================================
; ESP32-S3 (dual-core, WiFi 4 + BLE 5, USB)
; ============================================================================
[env:esp32s3_dev]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
build_type = debug
build_flags = ${env.build_flags} -Og -g3 -DDEVELOPMENT_BUILD=1 -DBOARD_HAS_PSRAM
board_build.sdkconfig_defaults = sdkconfig.defaults

[env:esp32s3_production]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
build_type = release
build_flags = ${env.build_flags} -O2 -DPRODUCTION_BUILD=1 -DBOARD_HAS_PSRAM
board_build.sdkconfig_defaults = sdkconfig.defaults;sdkconfig.production.defaults
board_build.embed_txtfiles =
    certs/api_root_ca.pem

; ============================================================================
; ESP32-C3 (single-core, WiFi 4 + BLE 5)
; ============================================================================
[env:esp32c3_dev]
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
build_type = debug
build_flags = ${env.build_flags} -Og -g3 -DDEVELOPMENT_BUILD=1
board_build.sdkconfig_defaults = sdkconfig.defaults

[env:esp32c3_production]
board = esp32-c3-devkitm-1
board_build.mcu = esp32c3
build_type = release
build_flags = ${env.build_flags} -O2 -DPRODUCTION_BUILD=1
board_build.sdkconfig_defaults = sdkconfig.defaults;sdkconfig.production.defaults
board_build.embed_txtfiles =
    certs/api_root_ca.pem

; ============================================================================
; Native host tests (links port_mock instead of port_esp_idf)
; ============================================================================
[env:native_test]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17 -Wall -Wextra
    -DUSE_PORT_MOCK
    -I components/hal/include
